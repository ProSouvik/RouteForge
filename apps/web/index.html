<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>RouteForge — Supply Chain Intelligence</title>

    <!-- PRELOADER STYLES -->
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        background: #0b0f10;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.3s ease;
        font-family: "Inter", sans-serif;
      }

      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .loader-content {
        text-align: center;
        color: white;
      }

      .brand {
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .route {
        font-size: 10rem;
        opacity: 0;
        transform: translateY(20px);
        animation: slideUp 0.8s ease forwards;
      }

      .forge {
        font-size: 10rem;
        color: #00e0c6;
        margin-left: 6px;
        opacity: 0;
        transform: translateY(20px);
        animation: slideUp 0.8s ease forwards;
        animation-delay: 0.3s;
      }

      .tagline {
        font-size: 3rem;
        margin-top: 10px;
        
        letter-spacing: 3px;
        color: #aaa;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 1s;
      }

      .skip {
        margin-top: 20px;
        font-size: 0.75rem;
        color: #666;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 0.05ms;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- PRELOADER -->
    <div id="preloader">
      <div class="loader-content">
        <h1 class="brand">
          <span class="route">Route</span><span class="forge">Forge</span>
        </h1>
        <p class="tagline">by DarthVaders</p>
        <p class="skip">...</p>
      </div>
    </div>

    <!-- APP ROOT -->
    <div id="app"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- PRELOADER SCRIPT -->
    <script>
      const removeLoader = () => {
        const loader = document.getElementById("preloader");
        if (!loader || loader.classList.contains("fade-out")) return;

        loader.classList.add("fade-out");
        setTimeout(() => loader.remove(), 500);
      };

      // Auto remove after 3 seconds
      setTimeout(removeLoader, 3000);

      // Skip interactions
      document.addEventListener("click", removeLoader);
      document.addEventListener("keydown", removeLoader);
    </script>
  </body>
</html>
